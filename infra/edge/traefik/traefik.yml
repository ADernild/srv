entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entrypoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http3:
      advertisedPort: 443
    http:
      middlewares:
        - secure-chain@file
      tls:
        options: default
        certResolver: letsencrypt
        domains:
          - main: dernild.com
            sans:
              - "*.dernild.com"
          - main: dernild.dk
            sans:
              - "*.dernild.dk"
          - main: dernild.dev
            sans:
              - "*.dernild.dev"
    forwardedHeaders:
      trustedIPs:
        # IPv6 CF ranges
        - "2400:cb00::/32"
        - "2606:4700::/32"
        - "2803:f800::/32"
        - "2405:b500::/32"
        - "2405:8100::/32"
        - "2a06:98c0::/29"
        - "2c0f:f248::/32"
        # IPv4 CF ranges
        - "173.245.48.0/20"
        - "103.21.244.0/22"
        - "103.22.200.0/22"
        - "103.31.4.0/22"
        - "141.101.64.0/18"
        - "108.162.192.0/18"
        - "190.93.240.0/20"
        - "188.114.96.0/20"
        - "197.234.240.0/22"
        - "198.41.128.0/17"
        - "162.158.0.0/15"
        - "104.16.0.0/13"
        - "104.24.0.0/14"
        - "172.64.0.0/13"
        - "131.0.72.0/22"

  bolt:
    address: ":7687"
    http:
      tls:
        options: default
        certResolver: letsencrypt
        domains:
          - main: dernild.com
            sans:
              - "*.dernild.com"
          - main: dernild.dk
            sans:
              - "*.dernild.dk"
          - main: dernild.dev
            sans:
              - "*.dernild.dev"
    forwardedHeaders:
      trustedIPs:
        # IPv6 CF ranges
        - "2400:cb00::/32"
        - "2606:4700::/32"
        - "2803:f800::/32"
        - "2405:b500::/32"
        - "2405:8100::/32"
        - "2a06:98c0::/29"
        - "2c0f:f248::/32"
        # IPv4 CF ranges
        - "173.245.48.0/20"
        - "103.21.244.0/22"
        - "103.22.200.0/22"
        - "103.31.4.0/22"
        - "141.101.64.0/18"
        - "108.162.192.0/18"
        - "190.93.240.0/20"
        - "188.114.96.0/20"
        - "197.234.240.0/22"
        - "198.41.128.0/17"
        - "162.158.0.0/15"
        - "104.16.0.0/13"
        - "104.24.0.0/14"
        - "172.64.0.0/13"
        - "131.0.72.0/22"

certificatesResolvers:
  letsencrypt:
    acme:
      email: alex@dernild.dk
      storage: /letsencrypt/acme.json
      keyType: EC256
      dnsChallenge:
        provider: cloudflare
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"
        delayBeforeCheck: 5

providers:
  docker:
    exposedByDefault: false
    endpoint: "unix:///socket/traefik.sock"
    network: internal
  file:
    directory: "/etc/traefik/rules"
    watch: true

api:
  dashboard: true
  insecure: true
  debug: true

log:
  level: DEBUG
  format: json

accessLog:
  format: json

metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: "traefik"

ping:
  entrypoint: "traefik"
